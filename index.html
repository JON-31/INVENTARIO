/* ──────────────────────────────────────────────────────
   FÓRMULAS DE MONTO:
   - VENDEDOR: precio por unidad → (precio / unidades) × cantidad
   - AUDITOR REY: precio por exhibidor/caja → precio × cantidad
   ────────────────────────────────────────────────────── */
const calcMontoVendedor=(prod,cant)=>{
  if(!prod||!cant||isNaN(cant)||parseFloat(cant)<=0)return null;
  const precioUnitario=prod.p/prod.u;
  return(parseFloat(cant)*precioUnitario).toFixed(2);
};

const calcMontoAuditor=(prod,cant)=>{
  if(!prod||!cant||isNaN(cant)||parseFloat(cant)<=0)return null;
  return(parseFloat(cant)*prod.p).toFixed(2);
};

          :<div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
            {misR.map(r=>(
              <div key={r.id} style={{background:'rgba(67,56,202,.5)',border:'1px solid #4338ca',borderRadius:'.5rem',padding:'1rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{color:'white',fontWeight:'700',margin:'0 0 2px',fontSize:'.9rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.producto}</p>
                    <p style={{color:'#93c5fd',fontFamily:'monospace',fontSize:'.75rem',margin:'0 0 2px'}}>{r.barcode}</p>
                    <p style={{color:'#c7d2fe',fontSize:'.75rem',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.tienda}</p>
                  </div>
                  <div style={{textAlign:'right',marginLeft:'.75rem',flexShrink:0}}>
                    <span style={{background:'rgba(255,255,255,.1)',color:'#a5b4fc',fontSize:'.7rem',fontWeight:'700',padding:'2px 6px',borderRadius:'4px',display:'inline-block',marginBottom:'4px'}}>{r.tipo||'—'}</span>
                    <p style={{color:'#4ade80',fontWeight:'700',margin:'.25rem 0 0',fontSize:'.85rem'}}>{r.cantidad} un.</p>
                    <p style={{color:'#fcd34d',fontWeight:'700',margin:'2px 0 0',fontSize:'.85rem'}}>${(parseFloat(r.monto_estimado)||0).toFixed(2)}</p>
                  </div>
                </div>
                <p style={{color:'#6366f1',fontSize:'.7rem',margin:'.5rem 0 0'}}>{r.fecha_reporte}{r.mes_vencimiento&&<span style={{marginLeft:'6px',background:'rgba(251,191,36,.15)',color:'#fcd34d',padding:'1px 6px',borderRadius:'3px',fontWeight:'700'}}>📅 Vence: {r.mes_vencimiento}</span>}</p>
              </div>
            ))}
          </div>}
        </div>
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
