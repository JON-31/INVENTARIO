const calcMontoVendedor=(prod,cant)=>{
  if(!prod||!cant||isNaN(cant)||parseFloat(cant)<=0)return null;
  return(parseFloat(cant)*(prod.p/prod.u)).toFixed(2);
};
const calcMontoAuditor=(prod,cant)=>{
  if(!prod||!cant||isNaN(cant)||parseFloat(cant)<=0)return null;
  return(parseFloat(cant)*prod.p).toFixed(2);
};

// ✅ FUNCIÓN EXCEL MACHETAZO CORREGIDA - Genera desde cero sin depender de plantilla base64
const descargarMachetazoExcel=(pedidos)=>{
  if(pedidos.length===0){alert('Agrega al menos un producto');return;}

  const wb=XLSX.utils.book_new();
  const today=new Date().toLocaleDateString('es-PA');

  // ── Hoja 1: PEDIDO DETALLADO ──
  const wsData=[];

  // Encabezado
  wsData.push(['PLANTILLA DE PEDIDO MACHETAZO - MASCOTAS','','','','','','']);
  wsData.push(['Vendedor:','','Fecha:',today,'','','']);
  wsData.push(['','','','','','','']);
  // Cabeceras de tabla
  wsData.push(['#','Material','Código de Barras','Descripción del Producto','Tienda / Store','Col. Plantilla','Cantidad']);

  pedidos.forEach((p,idx)=>{
    wsData.push([
      idx+1,
      p.pMat,
      p.pCod,
      p.pDesc,
      p.tStore,
      p.tColL,
      p.qty
    ]);
  });

  wsData.push(['','','','','','','']);
  wsData.push(['','','','','','','']);

  // Resumen por tienda
  wsData.push(['RESUMEN POR TIENDA','','','','','','']);
  wsData.push(['Tienda','Productos','Total Unidades','','','','']);
  const porTienda={};
  pedidos.forEach(p=>{
    const k=p.tStore;
    if(!porTienda[k]){porTienda[k]={prods:0,units:0};}
    porTienda[k].prods++;
    porTienda[k].units+=Number(p.qty);
  });
  Object.entries(porTienda).forEach(([t,v])=>{
    wsData.push([t,v.prods,v.units,'','','','']);
  });

  // Total general
  const totalUnidades=pedidos.reduce((a,p)=>a+Number(p.qty),0);
  wsData.push(['','','','','','','']);
  wsData.push(['TOTAL GENERAL','',totalUnidades,'','','','']);

  const ws1=XLSX.utils.aoa_to_sheet(wsData);
  ws1['!cols']=[{wch:4},{wch:12},{wch:18},{wch:52},{wch:20},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,'PEDIDO',ws1);

  // ── Hoja 2: FORMATO PLANTILLA (columnas por tienda) ──
  // Obtener tiendas únicas en el pedido (usando estructura plana)
  const tiendasEnPedido=[...new Map(pedidos.map(p=>[p.tStore,{store:p.tStore,colLetter:p.tColL}])).values()];
  const productosEnPedido=[...new Map(pedidos.map(p=>[p.pMat,{material:p.pMat,codigo:p.pCod,descripcion:p.pDesc}])).values()];

  const ws2Data=[];
  const header1=['Material','Código','Descripción',...tiendasEnPedido.map(t=>t.store)];
  ws2Data.push(header1);
  const header2=['','','',...tiendasEnPedido.map(t=>'Col.'+t.colLetter)];
  ws2Data.push(header2);

  productosEnPedido.forEach(prod=>{
    const fila=[prod.material, prod.codigo, prod.descripcion];
    tiendasEnPedido.forEach(tienda=>{
      const match=pedidos.find(p=>p.pMat===prod.material&&p.tStore===tienda.store);
      fila.push(match?match.qty:'');
    });
    ws2Data.push(fila);
  });

  const ws2=XLSX.utils.aoa_to_sheet(ws2Data);
  const colWidths=[{wch:12},{wch:16},{wch:50},...tiendasEnPedido.map(()=>({wch:14}))];
  ws2['!cols']=colWidths;
  XLSX.utils.book_append_sheet(wb,'FORMATO PLANTILLA',ws2);

  // Usar Blob para mayor compatibilidad con navegadores
  try {
    const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
    const blob = new Blob([wbout], {type:'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `machetazo_pedido_${new Date().toISOString().split('T')[0]}.xlsx`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);}, 100);
  } catch(e) {
    console.error('Error al generar Excel:', e);
    alert('Error al generar el Excel: ' + e.message);
  }
};

                onChange={e=>{setCodIn(e.target.value);setShowSug(true);if(prod)setProd(null);}}
                onFocus={()=>codIn&&setShowSug(true)}
                style={{width:'100%',background:'#991b1b',color:'white',border:'1px solid #ef4444',borderRadius:'.5rem',padding:'.75rem',boxSizing:'border-box',outline:'none'}}/>

                <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#7f1d1d',border:'1px solid #b91c1c',borderRadius:'.5rem',zIndex:100,maxHeight:'220px',overflowY:'auto',marginTop:'2px',boxShadow:'0 10px 25px rgba(0,0,0,.5)'}}>
                  {sugs.map(p=>(
                    <button key={p.b} onMouseDown={e=>{e.preventDefault();setProd(p);setCodIn(p.b+' - '+p.n);setShowSug(false);}}
                      style={{display:'block',width:'100%',textAlign:'left',padding:'.75rem 1rem',border:'none',borderBottom:'1px solid rgba(185,28,28,.5)',background:'transparent',cursor:'pointer',color:'white'}}>
                      <div style={{color:'#fca5a5',fontFamily:'monospace',fontSize:'.75rem'}}>{p.b}</div>
                      <div style={{fontWeight:'600',fontSize:'.85rem',marginTop:'2px'}}>{p.n}</div>
                      <div style={{color:'#4ade80',fontSize:'.75rem'}}>{p.m} · {p.t} · {p.u} un · ${p.p}</div>
                    </button>
                  ))}
                </div>
              )}
              {prod&&(
                <div style={{marginTop:'.5rem',background:'rgba(34,197,94,.15)',border:'1px solid #22c55e',borderRadius:'.5rem',padding:'.75rem',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{color:'#fca5a5',fontFamily:'monospace',fontSize:'.75rem'}}>{prod.b} · {prod.c}</div>
                    <div style={{color:'white',fontWeight:'700',fontSize:'.9rem',marginTop:'2px'}}>{prod.n}</div>
                    <div style={{color:'#4ade80',fontSize:'.75rem'}}>{prod.m} · {prod.t} de {prod.u} un · ${prod.p}</div>
                  </div>
                  <button onClick={()=>{setProd(null);setCodIn('');}} style={{background:'none',border:'none',color:'#f87171',cursor:'pointer',fontSize:'1.2rem'}}>✕</button>
                </div>
              )}
            </div>

            <div style={{marginBottom:'1rem'}}>
              <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>📦 Cantidad (exhibidores/cajas)</label>
              <input type="number" min="1" placeholder="Ej: 2" value={cant} onChange={e=>setCant(e.target.value)}
                style={{width:'100%',background:'#991b1b',color:'white',border:'1px solid #ef4444',borderRadius:'.5rem',padding:'.75rem',boxSizing:'border-box',outline:'none'}}/>
            </div>

            {prod&&cant&&parseFloat(cant)>0&&(
              <div style={{marginBottom:'1rem',background:'rgba(16,185,129,.15)',border:'1px solid #10b981',borderRadius:'.5rem',padding:'1rem'}}>
                <p style={{color:'#6ee7b7',fontSize:'.8rem',margin:'0 0 4px',fontWeight:'600'}}>💰 MONTO ESTIMADO (por {prod.t})</p>
                <p style={{color:'white',fontSize:'1.4rem',fontWeight:'700',margin:0}}>${montoActual}</p>
                <p style={{color:'#a7f3d0',fontSize:'.7rem',margin:'4px 0 0'}}>{cant} {prod.t} × ${prod.p} = ${montoActual}</p>
              </div>
            )}

            <div style={{display:'flex',gap:'.75rem'}}>
              <button onClick={guardar} disabled={saving} style={btn(saving?'#475569':'#16a34a',{flex:1})}>{saving?'⏳ Guardando...':'✓ Guardar Reporte'}</button>
              <button onClick={reset} style={btn('#991b1b',{flex:1,border:'1px solid #ef4444'})}>Cancelar</button>
            </div>
          </div>}

          <div style={{background:'rgba(153,27,27,.4)',border:'1px solid #b91c1c',borderRadius:'.75rem',padding:'1.25rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
              <h2 style={{color:'white',fontWeight:'700',margin:0,fontSize:'1rem'}}>Mis Reportes ({misR.length})</h2>
              <button onClick={cargar} style={{background:'none',border:'none',color:'#fca5a5',cursor:'pointer',fontSize:'.8rem'}}>🔄 Actualizar</button>

            {load?<p style={{color:'#fca5a5',textAlign:'center',padding:'1.5rem'}}>⏳ Cargando...</p>

                <div key={r.id} style={{background:'rgba(153,27,27,.5)',border:'1px solid #b91c1c',borderRadius:'.5rem',padding:'1rem'}}>

                      <p style={{color:'white',fontWeight:'700',margin:'0 0 2px',fontSize:'.9rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.producto}</p>
                      <p style={{color:'#fca5a5',fontFamily:'monospace',fontSize:'.75rem',margin:'0 0 2px'}}>{r.barcode}</p>
                      <p style={{color:'#fecaca',fontSize:'.75rem',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.tienda}</p>
                    </div>
                    <div style={{textAlign:'right',marginLeft:'.75rem',flexShrink:0}}>
                      <span style={{background:'rgba(255,255,255,.1)',color:'#fcd34d',fontSize:'.7rem',fontWeight:'700',padding:'2px 6px',borderRadius:'4px',display:'inline-block',marginBottom:'4px'}}>{r.tipo||'—'}</span>
                      <p style={{color:'#4ade80',fontWeight:'700',margin:'.25rem 0 0',fontSize:'.85rem'}}>{r.cantidad} un.</p>
                      <p style={{color:'#fcd34d',fontWeight:'700',margin:'2px 0 0',fontSize:'.85rem'}}>${(parseFloat(r.monto_estimado)||0).toFixed(2)}</p>
                    </div>
                  </div>
                  <p style={{color:'#f87171',fontSize:'.7rem',margin:'.5rem 0 0'}}>{r.fecha_reporte}</p>
                </div>
              ))}
            </div>}
          </div>
        </div>
      </div>
    );
  }

  /* ════════════ VENDEDOR ════════════ */
  const misR=reps.filter(r=>r.vendedor===user.v);
  const montoMio=misR.reduce((a,r)=>a+(parseFloat(r.monto_estimado)||0),0);
  const montoActual=calcMontoVendedor(prod,cant);
  const precioUnitario=prod?(prod.p/prod.u).toFixed(4):null;

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#312e81,#3730a3)'}}>
      <div style={{background:'linear-gradient(90deg,#4338ca,#6366f1)',padding:'1rem 1.5rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:'1rem'}}><Logo/>
          <div><h1 style={{color:'white',fontWeight:'700',fontSize:'1rem',margin:0}}>MARS - REPORTE</h1>
            <p style={{color:'#c7d2fe',fontSize:'.75rem',margin:0}}>{user.v}</p></div>
        </div>
        <button onClick={logout} style={btn('#dc2626',{fontSize:'.8rem',padding:'.5rem .75rem'})}>Salir</button>
      </div>
      {msg&&<div style={{background:'rgba(34,197,94,.15)',borderBottom:'1px solid #22c55e',color:'#86efac',padding:'.5rem',textAlign:'center',fontSize:'.85rem'}}>{msg}</div>}
      {err&&<div style={{background:'rgba(239,68,68,.15)',borderBottom:'1px solid #ef4444',color:'#fca5a5',padding:'.5rem',textAlign:'center',fontSize:'.85rem'}}>{err}</div>}

          <div><p style={{color:'#c7d2fe',fontSize:'.75rem',margin:0}}>Vendedor</p><p style={{color:'white',fontWeight:'700',margin:'.2rem 0 0',fontSize:'.85rem'}}>{user.v}</p></div>
          <div><p style={{color:'#c7d2fe',fontSize:'.75rem',margin:0}}>Mis Reportes</p><p style={{color:'#4ade80',fontWeight:'700',fontSize:'1.5rem',margin:'.2rem 0 0'}}>{misR.length}</p></div>
          <div><p style={{color:'#c7d2fe',fontSize:'.75rem',margin:0}}>Monto Total</p><p style={{color:'#fcd34d',fontWeight:'700',fontSize:'1.1rem',margin:'.2rem 0 0'}}>${montoMio.toFixed(2)}</p></div>
        </div>
        {!showForm&&<button onClick={()=>setShowForm(true)} style={btn('linear-gradient(90deg,#16a34a,#22c55e)',{width:'100%',padding:'1rem',fontSize:'1rem',marginBottom:'1.5rem',borderRadius:'.75rem'})}>
          + Agregar Producto con Próximo Vencimiento
        </button>}
        {showForm&&<div style={{background:'rgba(67,56,202,.4)',border:'1px solid rgba(34,197,94,.3)',borderRadius:'.75rem',padding:'1.5rem',marginBottom:'1.5rem'}}>
          <h2 style={{color:'white',fontWeight:'700',marginTop:0}}>Nuevo Reporte</h2>
          <div style={{marginBottom:'1rem'}}>
            <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>📍 Tienda</label>
            <select value={tId} onChange={e=>setTId(e.target.value)} style={{width:'100%',background:'#4338ca',color:'white',border:'1px solid #6366f1',borderRadius:'.5rem',padding:'.75rem',boxSizing:'border-box'}}>
              <option value="">-- Selecciona tu tienda --</option>
              {tiendasV.map(t=><option key={t.id} value={t.id}>{t.n}</option>)}
            </select>
          </div>
          <div style={{marginBottom:'1rem',position:'relative'}}>
            <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>🔍 Buscar Producto</label>
            <input type="text" placeholder="Código de barra, código FEDURO o nombre..." value={codIn}
              onChange={e=>{setCodIn(e.target.value);setShowSug(true);if(prod)setProd(null);}}
              onFocus={()=>codIn&&setShowSug(true)}
              style={{width:'100%',background:'#4338ca',color:'white',border:'1px solid #6366f1',borderRadius:'.5rem',padding:'.75rem',boxSizing:'border-box',outline:'none'}}/>
            {showSug&&sugs.length>0&&(
              <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#312e81',border:'1px solid #4338ca',borderRadius:'.5rem',zIndex:100,maxHeight:'220px',overflowY:'auto',marginTop:'2px',boxShadow:'0 10px 25px rgba(0,0,0,.5)'}}>
                {sugs.map(p=>(
                  <button key={p.b} onMouseDown={e=>{e.preventDefault();setProd(p);setCodIn(p.b+' - '+p.n);setShowSug(false);}}
                    style={{display:'block',width:'100%',textAlign:'left',padding:'.75rem 1rem',border:'none',borderBottom:'1px solid rgba(67,56,202,.5)',background:'transparent',cursor:'pointer',color:'white'}}>
                    <div style={{color:'#93c5fd',fontFamily:'monospace',fontSize:'.75rem'}}>{p.b}</div>
                    <div style={{fontWeight:'600',fontSize:'.85rem',marginTop:'2px'}}>{p.n}</div>
                    <div style={{color:'#4ade80',fontSize:'.75rem'}}>{p.m} · {p.t} · {p.u} un · ${p.p} → <strong>${(p.p/p.u).toFixed(4)}/un</strong></div>
                  </button>
                ))}
              </div>
            )}
            {prod&&(
              <div style={{marginTop:'.5rem',background:'rgba(34,197,94,.15)',border:'1px solid #22c55e',borderRadius:'.5rem',padding:'.75rem',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{color:'#93c5fd',fontFamily:'monospace',fontSize:'.75rem'}}>{prod.b} · {prod.c}</div>
                  <div style={{color:'white',fontWeight:'700',fontSize:'.9rem',marginTop:'2px'}}>{prod.n}</div>
                  <div style={{color:'#4ade80',fontSize:'.75rem'}}>{prod.m} · {prod.t} de {prod.u} un · ${prod.p} → <strong>${precioUnitario}/unidad</strong></div>
                </div>
                <button onClick={()=>{setProd(null);setCodIn('');}} style={{background:'none',border:'none',color:'#f87171',cursor:'pointer',fontSize:'1.2rem'}}>✕</button>
              </div>
            )}
          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>📦 Cantidad (unidades individuales)</label>
            <input type="number" min="1" placeholder="Ej: 10" value={cant} onChange={e=>setCant(e.target.value)}

          </div>
          <div style={{marginBottom:'1rem'}}>
            <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>📅 Mes de Vencimiento</label>

              style={{width:'100%',background:'#4338ca',color:mesVenc?'white':'#94a3b8',border:'1px solid #6366f1',borderRadius:'.5rem',padding:'.75rem',boxSizing:'border-box'}}>
              <option value="">-- Selecciona el mes --</option>
              {['Enero 2026','Febrero 2026','Marzo 2026','Abril 2026','Mayo 2026','Junio 2026','Julio 2026','Agosto 2026','Septiembre 2026','Octubre 2026','Noviembre 2026','Diciembre 2026'].map(m=>(

          </div>
          {prod&&cant&&parseFloat(cant)>0&&(
            <div style={{marginBottom:'1rem',background:'rgba(16,185,129,.15)',border:'1px solid #10b981',borderRadius:'.5rem',padding:'1rem'}}>

              <p style={{color:'white',fontSize:'1.4rem',fontWeight:'700',margin:0}}>${montoActual}</p>
              <p style={{color:'#a7f3d0',fontSize:'.7rem',margin:'4px 0 0'}}>{cant} un. × ${precioUnitario}/un = ${montoActual}</p>
              <p style={{color:'#6ee7b7',fontSize:'.7rem',margin:'2px 0 0'}}>(${prod.p} ÷ {prod.u} un. por {prod.t})</p>
            </div>
          )}
          <div style={{display:'flex',gap:'.75rem'}}>
            <button onClick={guardar} disabled={saving} style={btn(saving?'#475569':'#16a34a',{flex:1})}>{saving?'⏳ Guardando...':'✓ Guardar Reporte'}</button>
            <button onClick={reset} style={btn('#4338ca',{flex:1})}>Cancelar</button>
          </div>
        </div>}
        <div style={{background:'rgba(67,56,202,.4)',border:'1px solid #4338ca',borderRadius:'.75rem',padding:'1.25rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
            <h2 style={{color:'white',fontWeight:'700',margin:0,fontSize:'1rem'}}>Mis Reportes ({misR.length})</h2>
            <button onClick={cargar} style={{background:'none',border:'none',color:'#a5b4fc',cursor:'pointer',fontSize:'.8rem'}}>🔄 Actualizar</button>
          </div>
          {load?<p style={{color:'#a5b4fc',textAlign:'center',padding:'1.5rem'}}>⏳ Cargando...</p>
          :misR.length===0?<p style={{color:'#a5b4fc',textAlign:'center',padding:'1.5rem',fontSize:'.9rem'}}>Aún no has enviado reportes</p>
          :<div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
            {misR.map(r=>(
              <div key={r.id} style={{background:'rgba(67,56,202,.5)',border:'1px solid #4338ca',borderRadius:'.5rem',padding:'1rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{color:'white',fontWeight:'700',margin:'0 0 2px',fontSize:'.9rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.producto}</p>
                    <p style={{color:'#93c5fd',fontFamily:'monospace',fontSize:'.75rem',margin:'0 0 2px'}}>{r.barcode}</p>
                    <p style={{color:'#c7d2fe',fontSize:'.75rem',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.tienda}</p>
                  </div>
                  <div style={{textAlign:'right',marginLeft:'.75rem',flexShrink:0}}>
                    <span style={{background:'rgba(255,255,255,.1)',color:'#a5b4fc',fontSize:'.7rem',fontWeight:'700',padding:'2px 6px',borderRadius:'4px',display:'inline-block',marginBottom:'4px'}}>{r.tipo||'—'}</span>
                    <p style={{color:'#4ade80',fontWeight:'700',margin:'.25rem 0 0',fontSize:'.85rem'}}>{r.cantidad} un.</p>
                    <p style={{color:'#fcd34d',fontWeight:'700',margin:'2px 0 0',fontSize:'.85rem'}}>${(parseFloat(r.monto_estimado)||0).toFixed(2)}</p>
                  </div>
                </div>
                <p style={{color:'#6366f1',fontSize:'.7rem',margin:'.5rem 0 0'}}>{r.fecha_reporte}{r.mes_vencimiento&&<span style={{marginLeft:'6px',background:'rgba(251,191,36,.15)',color:'#fcd34d',padding:'1px 6px',borderRadius:'3px',fontWeight:'700'}}>📅 Vence: {r.mes_vencimiento}</span>}</p>
              </div>
            ))}
          </div>}
        </div>
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
