const sbFetch = async (method, endpoint, data = null) => {
  const url = `${SUPABASE_URL}/rest/v1${endpoint}`;
  const headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'apikey': SUPABASE_KEY,
    'Prefer': 'return=representation'
  };
  const opts = { method, headers };
  if (data) opts.body = JSON.stringify(data);
  try {
    const res = await fetch(url, opts);
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch(e) { console.error(e); return null; }
};

function App() {
  const [user, setUser] = useState(null);
  const [reportes, setReportes] = useState([]);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [tiendaId, setTiendaId] = useState('');
  const [cantidad, setCantidad] = useState('');
  const [mesVenc, setMesVenc] = useState('');
  const [codInput, setCodInput] = useState('');
  const [prodSel, setProdSel] = useState(null);
  const [mostrarSug, setMostrarSug] = useState(false);
  const [fVend, setFVend] = useState('');
  const [fTienda, setFTienda] = useState('');
  const [fMes, setFMes] = useState('');
  const [loginMode, setLoginMode] = useState(null);
  const [selVend, setSelVend] = useState('');
  const [searchVend, setSearchVend] = useState('');
  const [adminPass, setAdminPass] = useState('');
  const [adminErr, setAdminErr] = useState(false);
  const [msg, setMsg] = useState('');
  const [msgErr, setMsgErr] = useState('');

  const showMsg = (m, err=false) => { if(err) setMsgErr(m); else setMsg(m); setTimeout(()=>{setMsg('');setMsgErr('');},3000); };

  const cargar = useCallback(async () => {
    setLoading(true);
    const d = await sbFetch('GET', '/reportes?select=*&order=id.desc');
    if(d) setReportes(d); else showMsg('❌ No se pudo conectar a Supabase',true);
    setLoading(false);
  },[]);

  useEffect(()=>{ if(user) cargar(); },[user]);

  const tiendasVend = useMemo(()=> user?.v ? TIENDAS.filter(t=>t.vendedor===user.v) : [], [user]);

  const sugs = useMemo(()=>{
    if(!codInput.trim()||prodSel) return [];
    const q = codInput.toUpperCase();
    return CATALOGO.filter(p=>p.barcode.includes(q)||p.codigo.toUpperCase().includes(q)||p.nombre.toUpperCase().includes(q)||p.marca.toUpperCase().includes(q)).slice(0,8);
  },[codInput,prodSel]);

  const vendsFilter = useMemo(()=>VENDEDORES.filter(v=>v.nombre.toUpperCase().includes(searchVend.toUpperCase())),[searchVend]);

  const resetForm = () => { setTiendaId('');setCantidad('');setMesVenc('');setCodInput('');setProdSel(null);setMostrarSug(false);setShowForm(false); };
  const logout = () => { setUser(null);setLoginMode(null);setSelVend('');setSearchVend('');setAdminPass('');setAdminErr(false);setReportes([]);resetForm(); };

  const guardar = async () => {
    if(!tiendaId||!prodSel||!cantidad||!mesVenc){ alert('Completa todos los campos'); return; }
    const t = TIENDAS.find(t=>t.id===parseInt(tiendaId));
    setSaving(true);
    const r = await sbFetch('POST','/reportes',{
      vendedor:t.vendedor, tienda:t.nombre, barcode:prodSel.barcode, codigo:prodSel.codigo,
      producto:prodSel.nombre, marca:prodSel.marca, cantidad:parseInt(cantidad),
      mes_vencimiento:mesVenc, fecha_reporte:new Date().toLocaleDateString('es-ES')
    });
    setSaving(false);
    if(r&&!r.error){ showMsg('✅ Reporte guardado correctamente'); resetForm(); cargar(); }
    else showMsg('❌ Error al guardar. Verifica Supabase.',true);
  };

  const limpiar = async () => {
    if(!confirm('⚠️ ¿ELIMINAR TODOS LOS REPORTES?\nDescarga el CSV primero.')) return;
    await sbFetch('DELETE','/reportes?id=gte.0');
    showMsg('🗑️ Base de datos limpiada'); cargar();
  };

  const descargarCSV = (datos) => {
    const csv=['Vendedor,Tienda,Código Barra,Código FEDURO,Producto,Marca,Cantidad,Vencimiento,Fecha'].concat(
      datos.map(r=>`"${r.vendedor}","${r.tienda}","${r.barcode}","${r.codigo}","${r.producto}","${r.marca}",${r.cantidad},"${r.mes_vencimiento}","${r.fecha_reporte}"`)
    ).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download=`mars_${new Date().toISOString().split('T')[0]}.csv`; a.click();
  };

          <p style={{color:'#94a3b8',fontSize:'.85rem',marginTop:'.25rem'}}>Sistema de Gestión con Supabase</p>
        </div>
        {!loginMode && (
          <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>

            <button onClick={()=>setLoginMode('admin')} style={{background:'#1d4ed8',color:'white',border:'none',padding:'1rem',borderRadius:'.5rem',fontWeight:'700',fontSize:'1rem',cursor:'pointer'}}>📊 Acceder como Admin</button>
          </div>
        )}
        {loginMode==='admin' && (
          <div>
            <h2 style={{color:'white',fontWeight:'700',marginBottom:'.75rem'}}>🔐 Acceso Administrativo</h2>
            <input type="password" placeholder="Contraseña..." value={adminPass}
              onChange={e=>{setAdminPass(e.target.value);setAdminErr(false);}}
              onKeyDown={e=>{ if(e.key==='Enter'){ if(adminPass==='Feduromars2026') setUser({admin:true}); else{setAdminErr(true);setAdminPass('');} } }}
              style={{width:'100%',background:'#334155',color:'white',border:adminErr?'1px solid #ef4444':'1px solid #475569',borderRadius:'.5rem',padding:'.75rem 1rem',marginBottom:'.5rem',outline:'none',boxSizing:'border-box',fontSize:'1rem'}}/>
            {adminErr && <p style={{color:'#f87171',fontSize:'.85rem',marginBottom:'.5rem'}}>❌ Contraseña incorrecta</p>}
            <div style={{display:'flex',gap:'.75rem',marginTop:'.5rem'}}>
              <button onClick={()=>{ if(adminPass==='Feduromars2026') setUser({admin:true}); else{setAdminErr(true);setAdminPass('');} }} style={{flex:1,background:'#1d4ed8',color:'white',border:'none',padding:'.75rem',borderRadius:'.5rem',fontWeight:'700',cursor:'pointer'}}>Entrar</button>
              <button onClick={()=>{setLoginMode(null);setAdminPass('');setAdminErr(false);}} style={{flex:1,background:'#475569',color:'white',border:'none',padding:'.75rem',borderRadius:'.5rem',fontWeight:'700',cursor:'pointer'}}>Volver</button>
            </div>
          </div>
        )}
        {loginMode==='vendedor' && (

            <div style={{maxHeight:'240px',overflowY:'auto',marginBottom:'1rem',display:'flex',flexDirection:'column',gap:'.25rem'}}>

            </div>
            {selVend && <p style={{color:'#4ade80',fontSize:'.85rem',textAlign:'center',marginBottom:'.75rem'}}>✓ <strong>{selVend}</strong></p>}

              <button onClick={()=>{ if(selVend) setUser({v:selVend}); }} disabled={!selVend} style={{flex:1,background:selVend?'#16a34a':'#475569',color:'white',border:'none',padding:'.75rem',borderRadius:'.5rem',fontWeight:'700',cursor:selVend?'pointer':'default'}}>Entrar</button>
              <button onClick={()=>{setLoginMode(null);setSelVend('');setSearchVend('');}} style={{flex:1,background:'#475569',color:'white',border:'none',padding:'.75rem',borderRadius:'.5rem',fontWeight:'700',cursor:'pointer'}}>Volver</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  // ADMIN
  if(user.admin) {
    const filtrados = reportes.filter(r=>(!fVend||r.vendedor===fVend)&&(!fTienda||r.tienda===fTienda)&&(!fMes||r.mes_vencimiento===fMes));
    const hoy = new Date('2026-04-27');
    const alertas = reportes.filter(r=>(new Date(r.mes_vencimiento+'-01')-hoy)/(1000*60*60*24*30)<=1).length;
    const kpis=[
      {label:'Total Reportes',val:reportes.length,bg:'#059669'},
      {label:'Vendedores',val:new Set(reportes.map(r=>r.vendedor)).size,bg:'#2563eb'},
      {label:'Tiendas',val:new Set(reportes.map(r=>r.tienda)).size,bg:'#7c3aed'},
      {label:'⚠️ Próx. Venc.',val:alertas,bg:'#dc2626'},
    ];
    return (
      <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#0f172a,#1e293b)'}}>
        <div style={{background:'linear-gradient(90deg,#1e40af,#2563eb)',padding:'1rem 1.5rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:'1rem'}}><MarsLogo size={26}/>
            <div><h1 style={{color:'white',fontWeight:'700',fontSize:'1.1rem',margin:0}}>MARS - PANEL ADMIN</h1>
              <p style={{color:'#bfdbfe',fontSize:'.75rem',margin:0}}>📡 Conectado a Supabase</p></div>
          </div>
          <div style={{display:'flex',gap:'.5rem'}}>
            <button onClick={cargar} style={{background:'#3b82f6',color:'white',border:'none',padding:'.5rem .75rem',borderRadius:'.5rem',cursor:'pointer',fontSize:'.8rem'}}>🔄 Actualizar</button>
            <button onClick={logout} style={{background:'#dc2626',color:'white',border:'none',padding:'.5rem .75rem',borderRadius:'.5rem',cursor:'pointer',fontSize:'.8rem'}}>Salir</button>
          </div>
        </div>
        {msg && <div style={{background:'rgba(34,197,94,.15)',borderBottom:'1px solid #22c55e',color:'#86efac',padding:'.5rem',textAlign:'center',fontSize:'.85rem'}}>{msg}</div>}
        {msgErr && <div style={{background:'rgba(239,68,68,.15)',borderBottom:'1px solid #ef4444',color:'#fca5a5',padding:'.5rem',textAlign:'center',fontSize:'.85rem'}}>{msgErr}</div>}
        <div style={{maxWidth:'1200px',margin:'0 auto',padding:'1.5rem'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'1rem',marginBottom:'1.5rem'}}>
            {kpis.map(k=>(
              <div key={k.label} style={{background:k.bg,borderRadius:'.75rem',padding:'1rem 1.25rem',color:'white'}}>
                <p style={{fontSize:'.75rem',opacity:.8,margin:'0 0 .25rem'}}>{k.label}</p>
                <p style={{fontSize:'2rem',fontWeight:'700',margin:0}}>{k.val}</p>
              </div>
            ))}
          </div>
          <div style={{background:'rgba(51,65,85,.5)',border:'1px solid #475569',borderRadius:'.75rem',padding:'1.25rem',marginBottom:'1.5rem'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'.75rem'}}>
              {[
                <select key="fv" value={fVend} onChange={e=>setFVend(e.target.value)} style={{background:'#475569',color:'white',border:'none',padding:'.6rem',borderRadius:'.5rem',fontSize:'.8rem'}}>
                  <option value="">Todos los Vendedores</option>
                  {[...new Set(reportes.map(r=>r.vendedor))].sort().map(v=><option key={v} value={v}>{v}</option>)}
                </select>,
                <select key="ft" value={fTienda} onChange={e=>setFTienda(e.target.value)} style={{background:'#475569',color:'white',border:'none',padding:'.6rem',borderRadius:'.5rem',fontSize:'.8rem'}}>
                  <option value="">Todas las Tiendas</option>
                  {[...new Set(reportes.map(r=>r.tienda))].sort().map(t=><option key={t} value={t}>{t}</option>)}
                </select>,
                <select key="fm" value={fMes} onChange={e=>setFMes(e.target.value)} style={{background:'#475569',color:'white',border:'none',padding:'.6rem',borderRadius:'.5rem',fontSize:'.8rem'}}>
                  <option value="">Todos los Meses</option>
                  {[...new Set(reportes.map(r=>r.mes_vencimiento))].sort().map(m=><option key={m} value={m}>{m}</option>)}
                </select>,
                <button key="dl" onClick={()=>descargarCSV(filtrados)} style={{background:'#16a34a',color:'white',border:'none',padding:'.6rem',borderRadius:'.5rem',fontWeight:'700',cursor:'pointer',fontSize:'.8rem'}}>⬇️ Descargar CSV</button>,
                <button key="cl" onClick={limpiar} style={{background:'#dc2626',color:'white',border:'none',padding:'.6rem',borderRadius:'.5rem',fontWeight:'700',cursor:'pointer',fontSize:'.8rem'}}>🗑️ Limpiar BD</button>
              ]}
            </div>
          </div>
          <div style={{background:'rgba(51,65,85,.5)',border:'1px solid #475569',borderRadius:'.75rem',padding:'1.25rem',overflowX:'auto'}}>
            <h2 style={{color:'white',fontWeight:'700',marginTop:0}}>Reportes ({filtrados.length})</h2>
            {loading ? <p style={{color:'#94a3b8',textAlign:'center',padding:'2rem'}}>⏳ Cargando...</p>
            : filtrados.length===0 ? <p style={{color:'#94a3b8',textAlign:'center',padding:'2rem'}}>No hay reportes aún</p>
            : <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.8rem'}}>
              <thead><tr style={{borderBottom:'1px solid #475569'}}>
                {['Vendedor','Tienda','Cód. Barra','Producto','Cant.','Vencimiento','Fecha'].map(h=>(
                  <th key={h} style={{color:'#cbd5e1',fontWeight:'600',padding:'.6rem .5rem',textAlign:'left'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {filtrados.map(r=>{
                  const urg=(new Date(r.mes_vencimiento+'-01')-hoy)/(1000*60*60*24*30)<=1;
                  return <tr key={r.id} style={{borderBottom:'1px solid rgba(71,85,105,.3)',background:urg?'rgba(220,38,38,.1)':'transparent'}}>
                    <td style={{color:'white',padding:'.5rem',fontWeight:'500'}}>{r.vendedor}</td>
                    <td style={{color:'#cbd5e1',padding:'.5rem',maxWidth:'150px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.tienda}</td>
                    <td style={{color:'#93c5fd',padding:'.5rem',fontFamily:'monospace'}}>{r.barcode}</td>
                    <td style={{color:'white',padding:'.5rem',maxWidth:'180px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.producto}</td>
                    <td style={{color:'#cbd5e1',padding:'.5rem'}}>{r.cantidad}</td>
                    <td style={{padding:'.5rem'}}><span style={{background:urg?'rgba(239,68,68,.2)':'rgba(245,158,11,.2)',color:urg?'#fca5a5':'#fcd34d',padding:'.2rem .5rem',borderRadius:'.25rem',fontWeight:'700'}}>{r.mes_vencimiento}</span></td>
                    <td style={{color:'#94a3b8',padding:'.5rem'}}>{r.fecha_reporte}</td>
                  </tr>;
                })}
              </tbody>
            </table>}
          </div>
        </div>
      </div>
    );
  }

  // VENDEDOR
  const misRep = reportes.filter(r=>r.vendedor===user.v);
  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#312e81,#3730a3)'}}>
      <div style={{background:'linear-gradient(90deg,#4338ca,#6366f1)',padding:'1rem 1.5rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:'1rem'}}><MarsLogo size={26}/>
          <div><h1 style={{color:'white',fontWeight:'700',fontSize:'1rem',margin:0}}>MARS - REPORTE</h1>
            <p style={{color:'#c7d2fe',fontSize:'.75rem',margin:0}}>{user.v}</p></div>
        </div>
        <button onClick={logout} style={{background:'#dc2626',color:'white',border:'none',padding:'.5rem .75rem',borderRadius:'.5rem',cursor:'pointer',fontSize:'.8rem'}}>Salir</button>
      </div>
      {msg && <div style={{background:'rgba(34,197,94,.15)',borderBottom:'1px solid #22c55e',color:'#86efac',padding:'.5rem',textAlign:'center',fontSize:'.85rem'}}>{msg}</div>}
      {msgErr && <div style={{background:'rgba(239,68,68,.15)',borderBottom:'1px solid #ef4444',color:'#fca5a5',padding:'.5rem',textAlign:'center',fontSize:'.85rem'}}>{msgErr}</div>}
      <div style={{maxWidth:'600px',margin:'0 auto',padding:'1.5rem'}}>
        <div style={{background:'rgba(67,56,202,.4)',border:'1px solid #4338ca',borderRadius:'.75rem',padding:'1rem 1.25rem',marginBottom:'1.5rem',display:'flex',justifyContent:'space-between'}}>
          <div><p style={{color:'#c7d2fe',fontSize:'.8rem',margin:0}}>Vendedor</p><p style={{color:'white',fontWeight:'700',margin:'.25rem 0 0'}}>{user.v}</p></div>
          <div style={{textAlign:'right'}}><p style={{color:'#c7d2fe',fontSize:'.8rem',margin:0}}>Mis Reportes</p><p style={{color:'#4ade80',fontWeight:'700',fontSize:'1.5rem',margin:'.25rem 0 0'}}>{misRep.length}</p></div>
        </div>
        {!showForm && (
          <button onClick={()=>setShowForm(true)} style={{width:'100%',background:'linear-gradient(90deg,#16a34a,#22c55e)',color:'white',border:'none',padding:'1rem',borderRadius:'.75rem',fontWeight:'700',fontSize:'1rem',cursor:'pointer',marginBottom:'1.5rem'}}>
            + Agregar Producto con Próximo Vencimiento
          </button>
        )}
        {showForm && (
          <div style={{background:'rgba(67,56,202,.4)',border:'1px solid rgba(34,197,94,.3)',borderRadius:'.75rem',padding:'1.5rem',marginBottom:'1.5rem'}}>
            <h2 style={{color:'white',fontWeight:'700',marginTop:0}}>Nuevo Reporte</h2>
            {/* Tienda */}
            <div style={{marginBottom:'1rem'}}>
              <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>📍 Tienda</label>
              <select value={tiendaId} onChange={e=>setTiendaId(e.target.value)} style={{width:'100%',background:'#4338ca',color:'white',border:'1px solid #6366f1',borderRadius:'.5rem',padding:'.75rem',fontSize:'.9rem',boxSizing:'border-box'}}>
                <option value="">-- Selecciona tu tienda --</option>
                {tiendasVend.map(t=><option key={t.id} value={t.id}>{t.nombre}</option>)}
              </select>
            </div>
            {/* Producto */}
            <div style={{marginBottom:'1rem',position:'relative'}}>
              <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>🔍 Buscar Producto</label>
              <input type="text" placeholder="Código de barra o nombre del producto..." value={codInput}
                onChange={e=>{setCodInput(e.target.value);setMostrarSug(true);if(prodSel)setProdSel(null);}}
                onFocus={()=>codInput&&setMostrarSug(true)}
                style={{width:'100%',background:'#4338ca',color:'white',border:'1px solid #6366f1',borderRadius:'.5rem',padding:'.75rem',fontSize:'.9rem',boxSizing:'border-box'}}/>
              {mostrarSug && sugs.length>0 && (
                <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#312e81',border:'1px solid #4338ca',borderRadius:'.5rem',zIndex:100,maxHeight:'220px',overflowY:'auto',marginTop:'2px',boxShadow:'0 10px 25px rgba(0,0,0,.5)'}}>
                  {sugs.map(p=>(
                    <button key={p.barcode} onMouseDown={e=>{e.preventDefault();setProdSel(p);setCodInput(p.barcode+' - '+p.nombre);setMostrarSug(false);}}
                      style={{display:'block',width:'100%',textAlign:'left',padding:'.75rem 1rem',border:'none',borderBottom:'1px solid rgba(67,56,202,.5)',background:'transparent',cursor:'pointer',color:'white'}}>
                      <div style={{color:'#93c5fd',fontFamily:'monospace',fontSize:'.75rem'}}>{p.barcode}</div>
                      <div style={{fontWeight:'600',fontSize:'.9rem',marginTop:'2px'}}>{p.nombre}</div>
                      <div style={{color:'#4ade80',fontSize:'.75rem'}}>{p.marca}</div>
                    </button>
                  ))}
                </div>
              )}
              {prodSel && (
                <div style={{marginTop:'.5rem',background:'rgba(34,197,94,.15)',border:'1px solid #22c55e',borderRadius:'.5rem',padding:'.75rem',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{color:'#93c5fd',fontFamily:'monospace',fontSize:'.75rem'}}>{prodSel.barcode}</div>
                    <div style={{color:'white',fontWeight:'700',fontSize:'.9rem',marginTop:'2px'}}>{prodSel.nombre}</div>
                    <div style={{color:'#4ade80',fontSize:'.75rem'}}>{prodSel.marca}</div>
                  </div>
                  <button onClick={()=>{setProdSel(null);setCodInput('');}} style={{background:'none',border:'none',color:'#f87171',cursor:'pointer',fontSize:'1.2rem',lineHeight:1}}>✕</button>
                </div>
              )}
            </div>
            {/* Cantidad y mes */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
              <div>
                <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>📦 Cantidad</label>
                <input type="number" min="1" placeholder="Ej: 50" value={cantidad} onChange={e=>setCantidad(e.target.value)}
                  style={{width:'100%',background:'#4338ca',color:'white',border:'1px solid #6366f1',borderRadius:'.5rem',padding:'.75rem',fontSize:'.9rem',boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{color:'white',fontWeight:'700',fontSize:'.9rem',display:'block',marginBottom:'.5rem'}}>📅 Vencimiento</label>
                <select value={mesVenc} onChange={e=>setMesVenc(e.target.value)} style={{width:'100%',background:'#4338ca',color:'white',border:'1px solid #6366f1',borderRadius:'.5rem',padding:'.75rem',fontSize:'.9rem',boxSizing:'border-box'}}>
                  <option value="">-- Mes --</option>
                  {MESES.map(m=><option key={m} value={m}>{m}</option>)}
                </select>
              </div>
            </div>
            <div style={{display:'flex',gap:'.75rem'}}>
              <button onClick={guardar} disabled={saving} style={{flex:1,background:saving?'#475569':'#16a34a',color:'white',border:'none',padding:'.75rem',borderRadius:'.5rem',fontWeight:'700',cursor:saving?'default':'pointer'}}>
                {saving?'⏳ Guardando...':'✓ Guardar Reporte'}
              </button>
              <button onClick={resetForm} style={{flex:1,background:'#4338ca',color:'white',border:'none',padding:'.75rem',borderRadius:'.5rem',fontWeight:'700',cursor:'pointer'}}>Cancelar</button>
            </div>
          </div>
        )}
        {/* Mis reportes */}
        <div style={{background:'rgba(67,56,202,.4)',border:'1px solid #4338ca',borderRadius:'.75rem',padding:'1.25rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
            <h2 style={{color:'white',fontWeight:'700',margin:0,fontSize:'1rem'}}>Mis Reportes ({misRep.length})</h2>
            <button onClick={cargar} style={{background:'none',border:'none',color:'#a5b4fc',cursor:'pointer',fontSize:'.8rem'}}>🔄 Actualizar</button>
          </div>
          {loading ? <p style={{color:'#a5b4fc',textAlign:'center',padding:'1.5rem'}}>⏳ Cargando...</p>
          : misRep.length===0 ? <p style={{color:'#a5b4fc',textAlign:'center',padding:'1.5rem',fontSize:'.9rem'}}>Aún no has enviado reportes</p>
          : <div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
            {misRep.map(r=>(
              <div key={r.id} style={{background:'rgba(67,56,202,.5)',border:'1px solid #4338ca',borderRadius:'.5rem',padding:'1rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{color:'white',fontWeight:'700',margin:'0 0 2px',fontSize:'.9rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.producto}</p>
                    <p style={{color:'#93c5fd',fontFamily:'monospace',fontSize:'.75rem',margin:'0 0 2px'}}>{r.barcode}</p>
                    <p style={{color:'#c7d2fe',fontSize:'.75rem',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.tienda}</p>
                  </div>
                  <div style={{textAlign:'right',marginLeft:'.75rem',flexShrink:0}}>
                    <span style={{background:'rgba(245,158,11,.2)',color:'#fcd34d',padding:'.2rem .5rem',borderRadius:'.25rem',fontSize:'.75rem',fontWeight:'700'}}>{r.mes_vencimiento}</span>
                    <p style={{color:'#4ade80',fontWeight:'700',margin:'.25rem 0 0',fontSize:'.9rem'}}>{r.cantidad} un.</p>
                  </div>
                </div>
                <p style={{color:'#6366f1',fontSize:'.7rem',margin:'.5rem 0 0'}}>{r.fecha_reporte}</p>
              </div>
            ))}
          </div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
